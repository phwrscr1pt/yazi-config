# =============================================================================
#                         YAZI KEYMAP CONFIGURATION
#                    Matching your Neovim keybindings
# =============================================================================
# Location on Windows: %USERPROFILE%\.config\yazi\keymap.toml
# Location on Linux/Mac: ~/.config/yazi/keymap.toml
#
# Your Nvim patterns used here:
#   <C-s>  = Save (not applicable in yazi)
#   <C-g>  = Git (lazygit)
#   <C-p>  = Find files (fzf)
#   <A-w>  = Horizontal terminal
#   <A-q>  = Floating terminal / quit
#   Space  = Leader prefix (g + key patterns)

# =============================================================================
# HELP
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["?"]
run  = "help"
desc = "Show help"

# =============================================================================
# SHELL COMMAND (run any command with brace expansion)
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["!"]
run  = "shell --block --interactive"
desc = "Run shell command"

# =============================================================================
# GIT INTEGRATION - like your <leader>gg in nvim
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["<C-g>"]
run  = "shell --block lazygit"
desc = "Open LazyGit"

[[mgr.prepend_keymap]]
on   = ["g", "g"]
run  = "shell --block lazygit"
desc = "Open LazyGit (gg like nvim)"

[[mgr.prepend_keymap]]
on   = ["g", "s"]
run  = "shell --block -- git status"
desc = "Git status"

[[mgr.prepend_keymap]]
on   = ["g", "l"]
run  = "shell --block -- git log --oneline -20"
desc = "Git log"

[[mgr.prepend_keymap]]
on   = ["g", "d"]
run  = "shell --block -- git diff"
desc = "Git diff"

# =============================================================================
# TERMINAL - like your <A-w> and <A-q> in nvim
# =============================================================================
# Option 1: Block mode (suspends yazi, returns after exit)
[[mgr.prepend_keymap]]
on   = ["$"]
run  = "shell --block zsh"
desc = "Open shell (block mode)"

# Option 2: tmux split pane (horizontal)
[[mgr.prepend_keymap]]
on   = ["<C-t>"]
run  = "shell --orphan -- tmux split-window -h -c %h"
desc = "Open terminal in tmux pane (horizontal)"

# Option 3: tmux split pane (vertical)
[[mgr.prepend_keymap]]
on   = ["<A-t>"]
run  = "shell --orphan -- tmux split-window -v -c %h"
desc = "Open terminal in tmux pane (vertical)"

# Option 4: tmux new window
[[mgr.prepend_keymap]]
on   = ["<C-w>"]
run  = "shell --orphan -- tmux new-window -c %h"
desc = "Open terminal in new tmux window"

# =============================================================================
# NEOVIM INTEGRATION
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["<C-n>"]
run  = "shell --block -- nvim ."
desc = "Open nvim in directory"

[[mgr.prepend_keymap]]
on   = ["V"]
run  = "shell --block -- nvim %s"
desc = "Open selected in nvim"

# =============================================================================
# DIRECTORY SHORTCUTS (g + key, like vim goto)
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["g", "h"]
run  = "cd ~"
desc = "Go to home"

[[mgr.prepend_keymap]]
on   = ["g", "c"]
run  = "cd ~/.config"
desc = "Go to .config"

[[mgr.prepend_keymap]]
on   = ["g", "D"]
run  = "cd ~/Desktop"
desc = "Go to Desktop"

[[mgr.prepend_keymap]]
on   = ["g", "d"]
run  = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on   = ["g", "p"]
run  = "cd ~/projects"
desc = "Go to projects"

# Windows-specific paths
[[mgr.prepend_keymap]]
on   = ["g", "w"]
run  = "cd /d/HS"
desc = "Go to HS workspace"

[[mgr.prepend_keymap]]
on   = ["g", "n"]
run  = "cd ~/AppData/Local/nvim"
desc = "Go to nvim config (Windows)"

# =============================================================================
# FILE OPERATIONS SHORTCUTS
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["m", "d"]
run  = "create"
desc = "Create file/directory"

[[mgr.prepend_keymap]]
on   = ["<C-x>"]
run  = "shell -- chmod +x %s"
desc = "Make executable"

[[mgr.prepend_keymap]]
on   = ["e", "x"]
run  = "plugin smart-extract"
desc = "Smart extract archive"

[[mgr.prepend_keymap]]
on   = ["c", "z"]
run  = "plugin compress"
desc = "Compress to zip"

[[mgr.prepend_keymap]]
on   = ["<C-o>"]
run  = "plugin open-project"
desc = "Open project in VS Code"

# =============================================================================
# SEARCH / FZF - like your <C-p> in nvim
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["<C-f>"]
run  = "search --via=fd"
desc = "Search with fd"

# =============================================================================
# TOGGLE HIDDEN FILES
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["."]
run  = "hidden toggle"
desc = "Toggle hidden files (.)"

[[mgr.prepend_keymap]]
on   = ["z", "h"]
run  = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on   = ["<C-h>"]
run  = "hidden toggle"
desc = "Toggle hidden (Ctrl+H)"

# =============================================================================
# PREVIEW TOGGLE
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["z", "p"]
run  = "toggle_preview"
desc = "Toggle preview panel"

# =============================================================================
# YANK / COPY FILES
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["y", "y"]
run  = "yank"
desc = "Yank (copy) files"

[[mgr.prepend_keymap]]
on   = ["y", "x"]
run  = "yank --cut"
desc = "Yank (cut) files"

# =============================================================================
# COPY PATH UTILITIES
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["y", "p"]
run  = "copy path"
desc = "Copy absolute path"

[[mgr.prepend_keymap]]
on   = ["y", "d"]
run  = "copy dirname"
desc = "Copy directory path"

[[mgr.prepend_keymap]]
on   = ["y", "n"]
run  = "copy filename"
desc = "Copy filename"

# =============================================================================
# QUICK MARKS (bookmark locations)
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["'", "1"]
run  = "cd /d/HS/M9-Unix-script"
desc = "Bookmark 1: M9 Unix"

[[mgr.prepend_keymap]]
on   = ["'", "2"]
run  = "cd ~/nvim-config-class-bkk-2026"
desc = "Bookmark 2: Nvim config"

# =============================================================================
# SORT OPTIONS
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["o", "n"]
run  = "sort --by=natural"
desc = "Sort by natural order"

[[mgr.prepend_keymap]]
on   = ["o", "s"]
run  = "sort --by=size"
desc = "Sort by size"

[[mgr.prepend_keymap]]
on   = ["o", "m"]
run  = "sort --by=mtime"
desc = "Sort by modification time"

[[mgr.prepend_keymap]]
on   = ["o", "e"]
run  = "sort --by=extension"
desc = "Sort by extension"

[[mgr.prepend_keymap]]
on   = ["o", "r"]
run  = "sort --reverse"
desc = "Reverse sort order"

# =============================================================================
# LINEMODE OPTIONS (what to show next to files)
# =============================================================================
[[mgr.prepend_keymap]]
on   = ["m", "s"]
run  = "linemode size"
desc = "Linemode: size"

[[mgr.prepend_keymap]]
on   = ["m", "p"]
run  = "linemode permissions"
desc = "Linemode: permissions"

[[mgr.prepend_keymap]]
on   = ["m", "m"]
run  = "linemode mtime"
desc = "Linemode: modification time"

[[mgr.prepend_keymap]]
on   = ["m", "o"]
run  = "linemode owner"
desc = "Linemode: owner"

[[mgr.prepend_keymap]]
on   = ["m", "n"]
run  = "linemode none"
desc = "Linemode: none (hide)"

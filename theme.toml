# =============================================================================
#                         YAZI THEME CONFIGURATION
#                    OneDark-inspired color scheme
# =============================================================================
# Location on Windows: %USERPROFILE%\.config\yazi\theme.toml
# Location on Linux/Mac: ~/.config/yazi/theme.toml
#
# OneDark palette:
#   Background:  #282c34
#   Foreground:  #abb2bf
#   Red:         #e06c75
#   Green:       #98c379
#   Yellow:      #e5c07b
#   Blue:        #61afef
#   Magenta:     #c678dd
#   Cyan:        #56b6c2
#   Gray:        #5c6370
#   Light Gray:  #848b98

# =============================================================================
# MANAGER - Main interface colors
# =============================================================================
[manager]
# Current working directory path
cwd = { fg = "#61afef", bold = true }

# Cursor/hovered item
hovered = { fg = "#282c34", bg = "#61afef", bold = true }
preview_hovered = { underline = true }

# Tabs
tab_active = { fg = "#282c34", bg = "#61afef", bold = true }
tab_inactive = { fg = "#5c6370", bg = "#3e4451" }
tab_width = 1

# Borders
border_symbol = "│"
border_style = { fg = "#5c6370" }

# Markers
marker_copied = { fg = "#98c379", bg = "#98c379" }
marker_cut = { fg = "#e06c75", bg = "#e06c75" }
marker_selected = { fg = "#e5c07b", bg = "#e5c07b" }

# Count indicator
count_copied = { fg = "#282c34", bg = "#98c379" }
count_cut = { fg = "#282c34", bg = "#e06c75" }
count_selected = { fg = "#282c34", bg = "#e5c07b" }

# Find highlighting
find_keyword = { fg = "#e5c07b", bold = true, italic = true, underline = true }
find_position = { fg = "#c678dd", bg = "reset", italic = true }

# =============================================================================
# STATUS BAR
# =============================================================================
[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#5c6370", bg = "#5c6370" }

# Mode indicators (like vim modes)
mode_normal = { fg = "#282c34", bg = "#61afef", bold = true }
mode_select = { fg = "#282c34", bg = "#e5c07b", bold = true }
mode_unset = { fg = "#282c34", bg = "#e06c75", bold = true }

# Progress bar
progress_label = { fg = "#abb2bf", bold = true }
progress_normal = { fg = "#61afef", bg = "#3e4451" }
progress_error = { fg = "#e06c75", bg = "#3e4451" }

# Permissions
permissions_t = { fg = "#61afef" }
permissions_r = { fg = "#e5c07b" }
permissions_w = { fg = "#e06c75" }
permissions_x = { fg = "#98c379" }
permissions_s = { fg = "#5c6370" }

# =============================================================================
# FILE TYPES - Syntax highlighting for files
# =============================================================================
[filetype]
rules = [
    # DIRECTORIES
    { name = "*/", fg = "#61afef", bold = true },

    # Special directories (dimmed)
    { name = ".git/", fg = "#c678dd" },
    { name = "node_modules/", fg = "#5c6370" },
    { name = "__pycache__/", fg = "#5c6370" },
    { name = ".cache/", fg = "#5c6370" },
    { name = "target/", fg = "#5c6370" },
    { name = "dist/", fg = "#5c6370" },
    { name = "build/", fg = "#5c6370" },

    # DOCUMENTS
    { name = "*.md", fg = "#56b6c2" },
    { name = "*.txt", fg = "#abb2bf" },
    { name = "*.pdf", fg = "#e06c75" },
    { name = "*.doc*", fg = "#61afef" },

    # PYTHON
    { name = "*.py", fg = "#e5c07b" },
    { name = "*.pyi", fg = "#e5c07b" },
    { name = "*.pyc", fg = "#5c6370" },

    # JAVASCRIPT / TYPESCRIPT
    { name = "*.js", fg = "#e5c07b" },
    { name = "*.jsx", fg = "#56b6c2" },
    { name = "*.ts", fg = "#61afef" },
    { name = "*.tsx", fg = "#56b6c2" },
    { name = "*.mjs", fg = "#e5c07b" },
    { name = "*.cjs", fg = "#e5c07b" },

    # WEB
    { name = "*.html", fg = "#e06c75" },
    { name = "*.css", fg = "#c678dd" },
    { name = "*.scss", fg = "#c678dd" },
    { name = "*.vue", fg = "#98c379" },
    { name = "*.svelte", fg = "#e06c75" },

    # RUST
    { name = "*.rs", fg = "#e06c75" },
    { name = "Cargo.toml", fg = "#e06c75", bold = true },
    { name = "Cargo.lock", fg = "#5c6370" },

    # GO
    { name = "*.go", fg = "#56b6c2" },
    { name = "go.mod", fg = "#56b6c2", bold = true },
    { name = "go.sum", fg = "#5c6370" },

    # C / C++
    { name = "*.c", fg = "#61afef" },
    { name = "*.cpp", fg = "#61afef" },
    { name = "*.cc", fg = "#61afef" },
    { name = "*.h", fg = "#c678dd" },
    { name = "*.hpp", fg = "#c678dd" },

    # LUA (for your nvim config!)
    { name = "*.lua", fg = "#61afef" },
    { name = "init.lua", fg = "#61afef", bold = true },

    # VIM
    { name = "*.vim", fg = "#98c379" },
    { name = ".vimrc", fg = "#98c379", bold = true },
    { name = "init.vim", fg = "#98c379", bold = true },

    # SHELL
    { name = "*.sh", fg = "#98c379" },
    { name = "*.bash", fg = "#98c379" },
    { name = "*.zsh", fg = "#98c379" },
    { name = "*.fish", fg = "#98c379" },
    { name = ".bashrc", fg = "#98c379", bold = true },
    { name = ".zshrc", fg = "#98c379", bold = true },

    # CONFIG
    { name = "*.toml", fg = "#5c6370" },
    { name = "*.yaml", fg = "#5c6370" },
    { name = "*.yml", fg = "#5c6370" },
    { name = "*.json", fg = "#e5c07b" },
    { name = "*.xml", fg = "#e06c75" },
    { name = "*.ini", fg = "#5c6370" },
    { name = "*.conf", fg = "#5c6370" },
    { name = ".env", fg = "#e5c07b" },
    { name = ".env*", fg = "#e5c07b" },

    # GIT
    { name = ".gitignore", fg = "#e06c75" },
    { name = ".gitmodules", fg = "#e06c75" },
    { name = ".gitattributes", fg = "#e06c75" },

    # PACKAGE MANAGERS
    { name = "package.json", fg = "#98c379", bold = true },
    { name = "package-lock.json", fg = "#5c6370" },
    { name = "yarn.lock", fg = "#5c6370" },
    { name = "pnpm-lock.yaml", fg = "#5c6370" },
    { name = "requirements.txt", fg = "#e5c07b" },
    { name = "Pipfile", fg = "#e5c07b" },
    { name = "Pipfile.lock", fg = "#5c6370" },

    # DOCKER
    { name = "Dockerfile", fg = "#61afef", bold = true },
    { name = "docker-compose*", fg = "#61afef" },
    { name = ".dockerignore", fg = "#5c6370" },

    # MAKEFILE
    { name = "Makefile", fg = "#98c379", bold = true },
    { name = "makefile", fg = "#98c379", bold = true },
    { name = "CMakeLists.txt", fg = "#98c379", bold = true },

    # IMAGES
    { name = "*.png", fg = "#c678dd" },
    { name = "*.jpg", fg = "#c678dd" },
    { name = "*.jpeg", fg = "#c678dd" },
    { name = "*.gif", fg = "#c678dd" },
    { name = "*.svg", fg = "#c678dd" },
    { name = "*.ico", fg = "#c678dd" },
    { name = "*.webp", fg = "#c678dd" },

    # VIDEO
    { name = "*.mp4", fg = "#c678dd" },
    { name = "*.mkv", fg = "#c678dd" },
    { name = "*.avi", fg = "#c678dd" },
    { name = "*.mov", fg = "#c678dd" },
    { name = "*.webm", fg = "#c678dd" },

    # AUDIO
    { name = "*.mp3", fg = "#56b6c2" },
    { name = "*.wav", fg = "#56b6c2" },
    { name = "*.flac", fg = "#56b6c2" },
    { name = "*.ogg", fg = "#56b6c2" },

    # ARCHIVES
    { name = "*.zip", fg = "#e06c75", bold = true },
    { name = "*.tar", fg = "#e06c75", bold = true },
    { name = "*.gz", fg = "#e06c75", bold = true },
    { name = "*.xz", fg = "#e06c75", bold = true },
    { name = "*.7z", fg = "#e06c75", bold = true },
    { name = "*.rar", fg = "#e06c75", bold = true },

    # EXECUTABLES
    { name = "*", is = "exec", fg = "#98c379", bold = true },

    # SYMLINKS
    { name = "*", is = "link", fg = "#56b6c2", italic = true },

    # HIDDEN FILES (generic)
    { name = ".*", fg = "#5c6370" },
]

# =============================================================================
# SELECTION HIGHLIGHT
# =============================================================================
[selection]
active = { fg = "#282c34", bg = "#e5c07b", bold = true }
inactive = { fg = "#e5c07b" }

# =============================================================================
# INPUT DIALOG
# =============================================================================
[input]
border = { fg = "#61afef" }
title = { fg = "#61afef", bold = true }
value = { fg = "#abb2bf" }
selected = { reversed = true }

# =============================================================================
# COMPLETION MENU
# =============================================================================
[completion]
border = { fg = "#5c6370" }
active = { fg = "#282c34", bg = "#61afef" }
inactive = { fg = "#abb2bf" }

# =============================================================================
# TASKS PANEL
# =============================================================================
[tasks]
border = { fg = "#5c6370" }
title = { fg = "#61afef", bold = true }
hovered = { fg = "#282c34", bg = "#61afef" }

# =============================================================================
# WHICH-KEY (help popup)
# =============================================================================
[which]
mask = { bg = "#1e2127" }
cand = { fg = "#56b6c2" }
rest = { fg = "#5c6370" }
desc = { fg = "#abb2bf" }
separator = " → "
separator_style = { fg = "#5c6370" }

# =============================================================================
# HELP PANEL
# =============================================================================
[help]
on = { fg = "#56b6c2" }
run = { fg = "#c678dd" }
desc = { fg = "#abb2bf" }
hovered = { reversed = true, bold = true }
footer = { fg = "#5c6370", bg = "#282c34" }

# =============================================================================
# NOTIFY MESSAGES
# =============================================================================
[notify]
title_info = { fg = "#61afef" }
title_warn = { fg = "#e5c07b" }
title_error = { fg = "#e06c75" }

# =============================================================================
# ICONS (requires Nerd Font)
# =============================================================================
[icon]
rules = [
    # Directories
    { name = ".git/", text = "" },
    { name = "node_modules/", text = "" },
    { name = ".config/", text = "" },

    # Files by extension
    { name = "*.lua", text = "", fg = "#61afef" },
    { name = "*.py", text = "", fg = "#e5c07b" },
    { name = "*.js", text = "", fg = "#e5c07b" },
    { name = "*.ts", text = "", fg = "#61afef" },
    { name = "*.rs", text = "", fg = "#e06c75" },
    { name = "*.go", text = "", fg = "#56b6c2" },
    { name = "*.md", text = "", fg = "#56b6c2" },
    { name = "*.json", text = "", fg = "#e5c07b" },
    { name = "*.toml", text = "", fg = "#5c6370" },
    { name = "*.yaml", text = "", fg = "#5c6370" },
    { name = "*.yml", text = "", fg = "#5c6370" },
    { name = "*.sh", text = "", fg = "#98c379" },
    { name = "*.vim", text = "", fg = "#98c379" },
    { name = "*.html", text = "", fg = "#e06c75" },
    { name = "*.css", text = "", fg = "#c678dd" },
    { name = "*.png", text = "", fg = "#c678dd" },
    { name = "*.jpg", text = "", fg = "#c678dd" },
    { name = "*.svg", text = "", fg = "#c678dd" },
    { name = "*.zip", text = "", fg = "#e06c75" },
    { name = "*.tar.gz", text = "", fg = "#e06c75" },
    { name = ".gitignore", text = "", fg = "#e06c75" },
    { name = "Makefile", text = "", fg = "#98c379" },
    { name = "Dockerfile", text = "", fg = "#61afef" },
]
